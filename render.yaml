services:
  - type: web
    name: yash-kumar-portfolio
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SITE_URL
        sync: false
      - key: SITE_URL
        sync: false
